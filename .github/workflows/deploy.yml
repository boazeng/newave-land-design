name: Deploy to EC2

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        env:
          SHAREPOINT_TENANT_ID: ${{ secrets.SHAREPOINT_TENANT_ID }}
          SHAREPOINT_CLIENT_ID: ${{ secrets.SHAREPOINT_CLIENT_ID }}
          SHAREPOINT_CLIENT_SECRET: ${{ secrets.SHAREPOINT_CLIENT_SECRET }}
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: 22
          envs: SHAREPOINT_TENANT_ID,SHAREPOINT_CLIENT_ID,SHAREPOINT_CLIENT_SECRET
          script: |
            set -e
            cd /opt/newave-land-design
            # Preserve large data files that are deployed directly (not via git)
            mkdir -p /tmp/data_backup
            cp data/plans_*.json /tmp/data_backup/ 2>/dev/null || true
            git fetch origin main
            git reset --hard origin/main
            # Restore preserved data files
            cp /tmp/data_backup/plans_*.json data/ 2>/dev/null || true
            # Write env file with secrets
            sudo mkdir -p /opt/env
            sudo tee /opt/env/.env > /dev/null <<EOF
            SHAREPOINT_TENANT_ID=${SHAREPOINT_TENANT_ID}
            SHAREPOINT_CLIENT_ID=${SHAREPOINT_CLIENT_ID}
            SHAREPOINT_CLIENT_SECRET=${SHAREPOINT_CLIENT_SECRET}
            EOF
            sudo chmod 600 /opt/env/.env
            sudo chown ec2-user:ec2-user /opt/env/.env
            # Setup Python venv
            if [ ! -f venv/bin/activate ]; then
              rm -rf venv
              python3 -m venv venv
            fi
            source venv/bin/activate
            pip install -q -r backend/requirements.txt
            # Install Node.js if missing
            if ! command -v npm &> /dev/null; then
              curl -fsSL https://rpm.nodesource.com/setup_20.x | sudo bash -
              sudo yum install -y nodejs
            fi
            # Build frontend
            cd frontend
            npm install --silent
            npm run build
            cd ..
            # Restart services
            sudo systemctl restart newave
            sudo systemctl reload nginx
            echo "Deploy completed"
