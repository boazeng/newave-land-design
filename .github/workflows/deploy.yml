name: Deploy to EC2

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: 22
          script: |
            set -e
            cd /opt/newave-land-design
            # Stash any local changes (like updated data files)
            git stash -u || true
            git fetch origin main
            git reset --hard origin/main
            # Setup Python venv
            if [ ! -d venv ]; then
              python3 -m venv venv
            fi
            source venv/bin/activate
            pip install -q -r backend/requirements.txt
            # Build frontend
            cd frontend
            npm install --silent
            npm run build
            cd ..
            # Restart services
            sudo systemctl restart newave
            sudo systemctl reload nginx
            echo "Deploy completed"
